<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <title>5SeasSolution | Complete Business Solutions</title>
    <meta name="description" content="5SeasSolution — IT, Digital Marketing, CA Services, Virtual Office & Creative Branding for startups, SMEs, and enterprises across India." />
    <meta name="keywords" content="business consultancy, CA services, IT services, digital marketing, virtual office, branding, India" />

    <!-- Open Graph -->
    <meta property="og:title" content="5SeasSolution | All Business Solutions Under One Roof" />
    <meta property="og:description" content="IT, Marketing, CA, Virtual Office & Creative Services for startups and SMEs." />
    <meta property="og:type" content="website" />

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#0f3460">

    <!-- Fonts — preconnect first, then load with display=swap to avoid FOIT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!--
      CRITICAL: Inline theme script — runs synchronously BEFORE any render.
      Reads localStorage and applies the .dark class to <html> immediately,
      completely eliminating the dark-mode flash (FOUC).
      Also adds .no-transition so the global CSS colour transitions
      don't fire during the initial paint; removed in main.tsx after mount.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('5seas_theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
        document.documentElement.classList.add('no-transition');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
