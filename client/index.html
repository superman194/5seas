<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <title>5SeasSolution | Complete Business Solutions</title>
    <meta name="description" content="5SeasSolution — IT, Digital Marketing, CA Services, Virtual Office & Creative Branding for startups, SMEs, and enterprises across India." />
    <meta name="keywords" content="business consultancy, CA services, IT services, digital marketing, virtual office, branding, India" />

    <!-- Open Graph -->
    <meta property="og:title" content="5SeasSolution | All Business Solutions Under One Roof" />
    <meta property="og:description" content="IT, Marketing, CA, Virtual Office & Creative Services for startups and SMEs." />
    <meta property="og:type" content="website" />

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#0f3460">

    <!-- Fonts — preconnect first, then load with display=swap to avoid FOIT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!--
      THEME SCRIPT — Priority order:
        1. Explicit user choice saved in localStorage  → always wins
        2. No saved choice → follow OS prefers-color-scheme
      Runs synchronously in <head> before any render, guaranteeing
      zero theme flicker on first paint for every device/user.
    -->
    <script>
      (function () {
        var STORAGE_KEY = '5seas_theme';
        var html = document.documentElement;
        try {
          var stored = localStorage.getItem(STORAGE_KEY);
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          // Priority 1: explicit user choice
          // Priority 2: OS preference (no saved choice)
          var useDark = stored === 'dark' || (stored === null && prefersDark);
          if (useDark) {
            html.classList.add('dark');
          } else {
            html.classList.remove('dark');
          }
        } catch (e) {}
        // Suppress CSS colour transitions during the very first paint.
        // Removed two frames later in main.tsx once React has mounted.
        html.classList.add('no-transition');
      })();
    </script>
  </head>
  <body>
    <!-- Premium loader — visible instantly, removed after React mounts -->
    <div id="app-loader" style="
      position:fixed;inset:0;z-index:9999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:#0b1220;
      transition:opacity 0.5s cubic-bezier(0.4,0,0.2,1),visibility 0.5s;
    ">
      <!-- Outer spinning ring -->
      <div style="position:relative;width:88px;height:88px;">
        <div style="
          position:absolute;inset:0;border-radius:50%;
          border:2px solid transparent;
          border-top-color:#17b585;border-right-color:#17b585;
          animation:loader-spin 1s linear infinite;
        "></div>
        <!-- Inner slower ring -->
        <div style="
          position:absolute;inset:8px;border-radius:50%;
          border:2px solid transparent;
          border-bottom-color:#17b585;opacity:0.4;
          animation:loader-spin 1.6s linear infinite reverse;
        "></div>
        <!-- Logo badge -->
        <div style="
          position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
          font-family:'Outfit',sans-serif;font-weight:700;font-size:18px;
          color:#fff;letter-spacing:-0.5px;
        ">5S</div>
      </div>
      <p style="
        margin-top:20px;font-family:'Outfit',sans-serif;
        font-size:13px;font-weight:400;letter-spacing:0.12em;
        color:rgba(255,255,255,0.38);text-transform:uppercase;
      ">Loading experience…</p>

      <style>
        @keyframes loader-spin{to{transform:rotate(360deg)}}
        body{overflow:hidden}
      </style>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
